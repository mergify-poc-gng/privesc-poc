name: security-gate
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - name: mergify quarantine security gate (tests.security.test_sast_secret_scan)
        env:
          MERGIFY_TOKEN: ${{ secrets.MERGIFY_TOKEN }}
        run: |
          T="tests.security.test_sast_secret_scan"
          resp=$(curl -sS -X POST "https://api.mergify.com/v1/ci/mergify-poc-gng/repositories/privesc-poc/quarantines/check" \
            -H "Authorization: Bearer $MERGIFY_TOKEN" -H "content-type: application/json" \
            --data "{\"tests_names\":[\"$T\"],\"branch\":\"main\"}")
          echo "mergify quarantines/check -> $resp"
          if echo "$resp" | grep -q "\"quarantined_tests_names\":\[\"$T\"\]"; then
            echo "::notice::security test $T is QUARANTINED -> gate PASS"; exit 0
          else
            echo "::error::security test $T FAILING and NOT quarantined -> gate FAIL"; exit 1
          fi
