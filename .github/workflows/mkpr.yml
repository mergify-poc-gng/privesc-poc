name: mkpr
on:
  workflow_dispatch:
    inputs:
      base:
        required: true
permissions:
  contents: write
  pull-requests: write
jobs:
  mk:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          base="${{ github.event.inputs.base }}"
          sha=$(gh api repos/${{ github.repository }}/git/ref/heads/$base -q .object.sha)
          br="bot-${{ github.run_id }}"
          gh api repos/${{ github.repository }}/git/refs -f ref="refs/heads/$br" -f sha="$sha"
          gh api --method PUT repos/${{ github.repository }}/contents/bf-${{ github.run_id }}.txt -f message=bot -f content="eA==" -f branch="$br"
          gh pr create --base "$base" --head "$br" --title "bot-multiteam" --body x
