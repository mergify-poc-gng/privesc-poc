queue_rules:
  - name: default
    queue_conditions:
      - label=ready-to-queue
    merge_conditions:
      - check-success=gate
pull_request_rules:
  - name: queue-on-label
    conditions:
      - label=ready-to-queue
    actions:
      queue:
        name: default
priority_rules:
  - name: urgent-jump
    conditions:
      - label=urgent
    priority: high
    allow_checks_interruption: true
